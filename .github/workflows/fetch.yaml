name: Update constants from d2vpkr

on:
  workflow_dispatch: # Allow manual triggering
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours (tune as needed)

permissions:
  contents: write

# Never let two runs push at once; queue instead of racing.
concurrency:
  group: update-constants
  cancel-in-progress: false

jobs:
  update:
    name: Rebuild constants if d2vpkr changed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check d2vpkr for new commits
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          latest=$(curl -sSf --retry 3 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            'https://api.github.com/repos/dotabuff/d2vpkr/commits/master' | jq -r .sha)
          current=$(cat d2vpkr_commit 2>/dev/null || echo "")
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [[ "$latest" != "$current" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "d2vpkr changed: $current -> $latest"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "No d2vpkr changes since $current; nothing to do."
          fi

      - name: Setup Node.js
        if: steps.check.outputs.proceed == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.proceed == 'true'
        run: npm ci

      - name: Build constants
        if: steps.check.outputs.proceed == 'true'
        run: npm run build

      - name: Validate build output
        if: steps.check.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          heroes=$(jq 'length' build/heroes.json)
          items=$(jq 'length' build/items.json)
          abilities=$(jq 'length' build/abilities.json)
          echo "heroes=$heroes items=$items abilities=$abilities"
          if (( heroes < 120 || items < 100 || abilities < 1000 )); then
            echo "::error::Build output looks incomplete (heroes=$heroes items=$items abilities=$abilities) - refusing to commit."
            exit 1
          fi

      - name: Commit, version, and push if constants changed
        if: steps.check.outputs.proceed == 'true'
        env:
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Did the *generated constants* actually change? (ignore tracking/meta files)
          if git diff --quiet -- build index.ts index.js json; then
            echo "No constant changes. Advancing d2vpkr tracker only (no version bump)."
            echo "$LATEST" > d2vpkr_commit
            if ! git diff --quiet -- d2vpkr_commit; then
              git add d2vpkr_commit
              git commit -m "chore: track d2vpkr ${LATEST} (no constant changes)"
              git push
            fi
            exit 0
          fi

          # Real data change: record version (best-effort), bump, single commit + tag.
          version=$(curl -sS --retry 3 \
            'https://api.steampowered.com/IGCVersion_570/GetClientVersion/v1/' \
            | jq -r '.result.active_version // empty')
          echo "$LATEST" > d2vpkr_commit
          [ -n "$version" ] && echo "$version" > version || echo "Steam version unavailable; leaving version file unchanged."

          npm version patch --no-git-tag-version > /dev/null
          pkgver=$(node -p "require('./package.json').version")
          msg="Update constants from d2vpkr${version:+ (Dota 2 version ${version})} [v${pkgver}]"

          git add -A
          git commit -m "$msg"
          git tag "v${pkgver}"
          git push --follow-tags
